<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="site_title">チケットジェネレーター (Reiwa Edition)</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <!-- [預留 GA4 代碼位置] -->
    <!-- Google tag (gtag.js) -->

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script> -->

    <!-- [預留 AdSense 代碼位置] -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5661724500759448" crossorigin="anonymous"></script> -->

    <style>
        @font-face { font-family: 'ITC Avant Garde Gothic Std Extra Light'; src: url('fonts/ITC Avant Garde Gothic Std Extra Light.woff2') format('woff2'); }
        @font-face { font-family: 'AR ADGothicJP'; src: url('fonts/jadhei01m.woff2') format('woff2'); }
        @font-face { font-family: 'KozGoPr6N'; src: url('fonts/KozGoPr6N-Medium.woff2') format('woff2'); }

        :root {
            --bg-base: #FDF9FA; --bg-panel: rgba(255, 255, 255, 0.75); --bg-canvas-area: #F5F0F2;
            --primary: #F676A6; --primary-hover: #E55A8C; --text-main: #333333; --text-muted: #888888;
            --border-glass: rgba(255, 255, 255, 0.5); --shadow-soft: 0 8px 32px rgba(246, 118, 166, 0.08);
            --radius-lg: 20px; --radius-md: 12px; --radius-sm: 8px; --spacing-panel: 24px;
        }
        [data-theme="dark"] {
            --bg-base: #121212; --bg-panel: rgba(30, 30, 30, 0.75); --bg-canvas-area: #1A1A1A;
            --text-main: #EEEEEE; --text-muted: #AAAAAA; --border-glass: rgba(255, 255, 255, 0.05);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'KozGoPr6N', 'Noto Sans JP', sans-serif; background: var(--bg-base); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: all 0.3s; }
        .glass { background: var(--bg-panel); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border-glass); box-shadow: var(--shadow-soft); }
        
        /* 頂部 */
        .topbar { height: 60px; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .brand-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
        .topbar-tools { display: flex; align-items: center; gap: 16px; }
        .tool-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 8px; border-radius: 50%; transition: all 0.2s; }
        .tool-btn:hover { background: var(--bg-panel); color: var(--primary); }
        .lang-select { background: transparent; border: 1px solid var(--border-glass); color: var(--text-main); padding: 6px 12px; border-radius: var(--radius-sm); outline: none; }

        /* 工作區與畫布 */
        .workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        .canvas-area { flex: 1; background: var(--bg-canvas-area); border-radius: var(--radius-lg) 0 0 var(--radius-lg); margin-left: 12px; display: flex; justify-content: center; align-items: center; position: relative; overflow: auto; }
        .canvas-wrapper { position: relative; transition: transform 0.2s; }
        .canvas-wrapper:hover { transform: scale(1.02); cursor: pointer; }
        .canvas-wrapper::after { content: ''; position: absolute; inset: 0; border: 2px dashed transparent; border-radius: 8px; pointer-events: none; transition: 0.3s; }
        .canvas-wrapper:hover::after { border-color: var(--primary); }
        
        .member-header { position: absolute; top: 24px; display: flex; align-items: center; gap: 12px; padding: 8px 16px; border-radius: 100px; z-index: 10; }
        .member-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        
        .fab-group { position: absolute; bottom: 32px; display: flex; gap: 16px; z-index: 10; }
        .btn-primary, .btn-secondary { padding: 10px 20px; border-radius: 100px; border: none; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(246, 118, 166, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-secondary { background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-glass); }
        
        /* 側邊抽屜 */
        .drawer { width: 360px; border-left: 1px solid var(--border-glass); padding: var(--spacing-panel); overflow-y: auto; transition: 0.3s; }
        .drawer-section { margin-bottom: 24px; }
        .drawer-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .input-group label { font-size: 0.85rem; font-weight: 500; }
        .modern-input, .modern-select { background: transparent; border: 1px solid var(--border-glass); color: var(--text-main); padding: 8px 12px; border-radius: var(--radius-sm); width: 100%; outline: none; }
        
        .slider-group { background: rgba(0,0,0,0.02); padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-glass); margin-top: 4px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; }
        .slider-val { color: var(--primary); background: rgba(246, 118, 166, 0.1); padding: 2px 8px; border-radius: 10px; font-weight: 700; }
        input[type="range"] { width: 100%; accent-color: var(--primary); }
        
        .color-picker-wrap { display: flex; align-items: center; gap: 12px; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

        /* Icon 導航 */
        .icon-nav { width: 64px; border-left: 1px solid var(--border-glass); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 20px; z-index: 20; }
        .nav-icon { color: var(--text-muted); cursor: pointer; padding: 10px; border-radius: 12px; transition: 0.2s; position: relative; }
        .nav-icon.active, .nav-icon:hover { color: var(--primary); background: rgba(246, 118, 166, 0.1); }
        .nav-icon::after { content: attr(data-tooltip); position: absolute; right: 100%; top: 50%; transform: translateY(-50%) translateX(-8px); background: var(--text-main); color: var(--bg-base); padding: 4px 8px; font-size: 0.75rem; border-radius: 4px; white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.2s; }
        .nav-icon:hover::after { opacity: 1; transform: translateY(-50%) translateX(-12px); }
        .special-link { margin-top: auto; color: #FF5C8D; animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(255,92,141,0.4); } 70% { box-shadow: 0 0 0 10px rgba(255,92,141,0); } 100% { box-shadow: 0 0 0 0 rgba(255,92,141,0); } }

        /* Footer */
        .global-footer { height: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; font-size: 0.75rem; color: var(--text-muted); }
        .footer-links { display: flex; gap: 16px; }
        .footer-links a { color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 4px; }
        .footer-links a:hover { color: var(--primary); }

        /* QR Code 預覽 */
        #qrPreview { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="brand-title" data-i18n="site_title">Ticket Generator</div>
        <div class="topbar-tools">
            <select class="lang-select" id="languageSelector">
                <option value="ja" selected>日本語</option>
                <option value="en">English</option>
                <option value="zh-TW">中文（繁體）</option>
                <option value="zh-CN">中文（简体）</option>
                <option value="ko">한국어</option>
                <option value="th">ไทย</option>
                <option value="id">Bahasa Indonesia</option>
            </select>
            <button class="tool-btn" id="themeToggleBtn"><i data-lucide="moon"></i></button>
        </div>
    </header>

    <main class="workspace">
        <section class="canvas-area" id="canvasArea">
            <div class="member-header glass" id="memberHeader" style="display: none;">
                <img src="" id="memberAvatar" alt="Avatar">
                <h2 id="memberName"></h2>
            </div>

            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="ticketCanvas"></canvas>
            </div>

            <div class="fab-group">
                <button class="btn-secondary" id="shareBtn">
                    <i data-lucide="twitter"></i> <span data-i18n="share_x_twitter">Share</span>
                </button>
                <button class="btn-primary" id="downloadBtn">
                    <i data-lucide="printer"></i> <span data-i18n="download_button">Download</span>
                </button>
            </div>
        </section>

        <aside class="drawer glass" id="settingsDrawer">
            <!-- 神推設定 -->
            <div class="drawer-section">
                <div class="drawer-title" data-i18n="member_color"><i data-lucide="users"></i> Member Color</div>
                <div class="input-group">
                    <select class="modern-select" id="memberSelector">
                        <option value="">...</option>
                    </select>
                </div>
                <!-- 雙色設定區 -->
                <div class="color-picker-wrap mt-2">
                    <label data-i18n="rect1Color">Box Color (Color A)</label>
                    <input type="color" id="rect1Color" value="#2086D1">
                </div>
                <div class="color-picker-wrap mt-2">
                    <label data-i18n="background_gradient_start">BG Color (Color B)</label>
                    <input type="color" id="bgColor" value="#FDF9FA">
                </div>
            </div>

            <!-- 標誌設定 -->
            <div class="drawer-section">
                <div class="drawer-title" data-i18n="logo_settings"><i data-lucide="type"></i> Logo Settings</div>
                <div class="input-group">
                    <label data-i18n="logo_line1">Line 1</label>
                    <input type="text" class="modern-input" id="rect1Line1" value="YSS">
                    <div class="slider-group">
                        <div class="slider-header"><span data-i18n="x">X</span> <span class="slider-val" id="rect1Line1X_val">0</span></div>
                        <input type="range" id="rect1Line1X_slider" min="-10" max="10" step="0.5" value="0">
                    </div>
                </div>
                <div class="input-group">
                    <label data-i18n="logo_line2">Line 2</label>
                    <input type="text" class="modern-input" id="rect1Line2" value="48">
                </div>
            </div>

            <!-- 公演資訊 -->
            <div class="drawer-section">
                <div class="drawer-title" data-i18n="event_birthday"><i data-lucide="calendar-heart"></i> Event & Birthday</div>
                <div class="input-group">
                    <label data-i18n="event">Event Name</label>
                    <input type="text" class="modern-input" id="text2" value="「ここからだ」 公演">
                </div>
                <div class="input-group">
                    <label data-i18n="birthday_line1">Birthday (Line 1)</label>
                    <input type="text" class="modern-input" id="text3Line1" value="秋元康 生誕祭">
                </div>
                <div class="input-group">
                    <label data-i18n="birthday_line2">Birthday (Line 2)</label>
                    <input type="text" class="modern-input" id="text3Line2" value="YSS48劇場">
                </div>
            </div>

            <!-- 日期與編號 -->
            <div class="drawer-section">
                <div class="drawer-title" data-i18n="date_number"><i data-lucide="hash"></i> Date & Number</div>
                <div class="input-group">
                    <label data-i18n="date_line1">Date</label>
                    <input type="text" class="modern-input" id="text4Line1" value="＜日付＞2026年05月02日（金）">
                </div>
                <div class="input-group">
                    <label data-i18n="date_line2">Time</label>
                    <input type="text" class="modern-input" id="text4Line2" value="OPEN：18時10分       START：18時30分      ￥3,400">
                </div>
                <div class="input-group">
                    <label data-i18n="ticket_number">Ticket Number</label>
                    <input type="text" class="modern-input" id="text5" value="048番">
                </div>
                <div class="input-group">
                    <label data-i18n="postal_code">Postal Code / Name</label>
                    <input type="text" class="modern-input" id="text6" value="① ❘ 000－0000 ❘ ゴメン先生 様">
                </div>
            </div>

            <!-- Footer 與 QR Code -->
            <div class="drawer-section">
                <div class="drawer-title" data-i18n="qr_others"><i data-lucide="qr-code"></i> QR & Footer</div>
                <div class="input-group">
                    <label data-i18n="qr_code_url">QR Code URL</label>
                    <input type="url" class="modern-input" id="qrCodeUrl" placeholder="https://...">
                    <div id="qrPreview"></div>
                </div>
                <div class="input-group">
                    <label data-i18n="venue">Venue</label>
                    <input type="text" class="modern-input" id="text11" value="YSS48 Theater">
                </div>
            </div>
            
            <!-- AdSense 預留區塊 -->
            <div class="ad-wrapper">
                <!-- 插入 Adsense JS -->
            </div>
        </aside>

        <nav class="icon-nav glass">
            <div class="nav-icon active" data-tooltip="神推設定"><i data-lucide="user"></i></div>
            <div class="nav-icon" data-tooltip="標誌設定"><i data-lucide="type"></i></div>
            <div class="nav-icon" data-tooltip="公演資訊"><i data-lucide="calendar-heart"></i></div>
            <div class="nav-icon" data-tooltip="日期編號"><i data-lucide="hash"></i></div>
            <div class="nav-icon" data-tooltip="QR 與進階"><i data-lucide="qr-code"></i></div>
            
            <div class="nav-icon special-link" data-tooltip="尋找靈魂伴侶 ✨" onclick="window.open('https://gomensensei.github.io/AKB-MBTI-with-wota/','_blank')">
                <i data-lucide="sparkles"></i>
            </div>
        </nav>
    </main>

    <footer class="global-footer">
        <div data-i18n="copyright_notice">
            ©AKB48 / DH Co., Ltd. 僅供非商業興趣使用，製作者恕不承擔相關責任。
        </div>
        <div class="footer-links">
            <a href="https://x.com/sorrysir_gomen" target="_blank"><i data-lucide="bug" size="14"></i> <span data-i18n="report_bug">回報錯誤</span></a>
            <a href="https://www.paypal.com/paypalme/gomensensei" target="_blank"><i data-lucide="heart" size="14"></i> <span data-i18n="donate">捐款支持</span></a>
        </div>
    </footer>

    <script src="script.js" defer></script>
    <script>lucide.createIcons();</script>
</body>
</html>
